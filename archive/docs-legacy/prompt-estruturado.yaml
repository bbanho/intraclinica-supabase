context:
  project: "CRM Médico"
  tech_stack:
    - "Angular"
    - "Supabase"
    - "NestJS (opcional)"
  objectives:
    - arquitetura escalável
    - entregáveis claros
    - testes automatizados
    - métricas definidas

instructions:
  - "Retornar respostas objetivas e acionáveis."
  - "Evitar detalhes irrelevantes de UI ou estilos."
  - "Organizar por entregáveis e passos técnicos de alto nível."
  - "Incluir dependências e pré-requisitos."
  - "Fornecer métricas de sucesso mensuráveis."
  - "Inserir estimativas de tempo e Definition of Done."

response_format:
  summary: "Texto objetivo do que será entregue."
  deliverables:
    - title: "Nome da entrega"
      description: "Descrição breve"
      steps:
        - "Passo 1"
        - "Passo 2"
      dependencies:
        - "Dependência 1"
        - "Dependência 2"
      metrics:
        latency_ms: null
        coverage_percent: null
      time_estimate:
        days: null
        hours: null
      definition_of_done:
        - "Critério 1"
        - "Critério 2"
  risks_and_mitigation:
    - "Risco + mitigação"
  alternatives:
    - "Alternativa técnica (quando pertinente)"

constraints:
  - "Não gerar pseudo-código sem contexto executável."
  - "Todo snippet deve ser claro e pragmático."
  - "Usar padrões de arquitetura e nomes de técnicas quando pertinentes."
