<div class="clinical-execution-container">
  <h2>Execução Clínica</h2>
  
  <div class="execution-form">
    <div class="form-group">
      <label for="patient">Paciente</label>
      <select id="patient" [(ngModel)]="selectedPatientId" class="form-control">
        <option value="" disabled>Selecione um Paciente</option>
        <option *ngFor="let p of patients" [value]="p.id">
          {{ p.name }} ({{ p.cpf || 'Sem CPF' }})
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="procedure">Procedimento</label>
      <select id="procedure" [(ngModel)]="selectedProcedureId" class="form-control">
        <option value="" disabled>Selecione o Procedimento</option>
        <option *ngFor="let pt of procedureTypes" [value]="pt.id">
          {{ pt.name }} ({{ pt.code || 'N/A' }})
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="notes">Observações</label>
      <textarea id="notes" [(ngModel)]="notes" class="form-control" rows="2"></textarea>
    </div>

    <div class="actions">
      <button 
        (click)="perform()" 
        [disabled]="isLoading || !selectedProcedureId || !selectedPatientId"
        class="btn-primary">
        {{ isLoading ? 'Executando...' : 'Realizar Procedimento' }}
      </button>
    </div>

    <div *ngIf="message" class="alert success">{{ message }}</div>
    <div *ngIf="error" class="alert error">{{ error }}</div>
  </div>

  <div class="audit-log">
    <h3>Últimas Execuções (Audit Log)</h3>
    <table *ngIf="auditLog.length > 0">
      <thead>
        <tr>
          <th>Data/Hora</th>
          <th>Profissional</th>
          <th>Ação</th>
          <th>Qtd</th>
          <th>Detalhes</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of auditLog">
          <td>{{ log.created_at | date:'short' }}</td>
          <td>{{ log.actor?.name || 'Desconhecido' }}</td>
          <td>{{ log.reason }}</td>
          <td>{{ log.qty_change }}</td>
          <td>{{ log.notes }}</td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="auditLog.length === 0">Nenhuma atividade recente.</p>
  </div>
</div>
