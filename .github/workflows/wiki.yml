name: 📖 Wiki VitePress

on:
  push:
    branches:
      - docs/test-wiki-skills
    paths:
      - 'wiki-site/**'
      - '.github/workflows/wiki.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install & Build Wiki
        run: |
          cd wiki-site
          npm ci
          npm run docs:build

      - name: ☁️ Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'intraclinica-wiki'
          directory: 'wiki-site/.vitepress/dist'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
