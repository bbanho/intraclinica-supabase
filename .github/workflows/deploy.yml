name: 🚀 CI/CD IntraClinica & Documentação

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4

      # -- PARTE 1: COMPILAR OS ARQUIVOS .TEX (ABNT2) PARA PDF --
      - name: 📝 Compilar Documentação LaTeX (IntraClinica Master Report)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: documentacao
          root_file: intraclinica-master-report.tex
          compiler: pdflatex
          args: "-interaction=nonstopmode -halt-on-error"

      # -- PARTE 2: COMPILAR O SAAS (ANGULAR 18+) --
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Build Frontend (Angular)
        run: |
          cd frontend-v2
          npm ci
          ./node_modules/.bin/tsc --noEmit -p tsconfig.app.json
          npm run build -- --configuration=production

      # -- PARTE 3: MERGE DE ASSETS (APP + DOCS + PDFs) --
      - name: 🔄 Integrar Documentação com o App Compilado
        run: |
          # Cria a pasta /documentacao/ dentro da pasta de publicação final do Angular (browser)
          mkdir -p frontend-v2/dist/frontend-v2/browser/documentacao
          
          # Copia o portal estático (index.html), os arquivos .md e o PDF gerado
          cp -r documentacao/* frontend-v2/dist/frontend-v2/browser/documentacao/

      # -- PARTE 4: PUBLICAÇÃO (CLOUDFLARE PAGES) --
      - name: ☁️ Deploy no Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'intraclinica'
          directory: 'frontend-v2/dist/frontend-v2/browser'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
