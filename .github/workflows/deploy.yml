name: 🚀 CI/CD IntraClinica & Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'wiki-site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - wiki

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Angular SaaS (only when frontend/ changes)
  # ────────────────────────────────────────────────────────────
  build-frontend:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target != 'wiki' || github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Build Frontend (Angular)
        run: |
          cd frontend
          npm ci
          ./node_modules/.bin/tsc --noEmit -p tsconfig.app.json
          npm run build -- --configuration=production

      - name: 🔄 Integrar Wiki no App Compilado
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all'
        run: |
          cd wiki-site
          npm ci
          npm run docs:build
          cd ..
          mkdir -p frontend/dist/frontend/browser/wiki
          cp -r wiki-site/.vitepress/dist/* frontend/dist/frontend/browser/wiki/

      - name: ☁️ Deploy no Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'intraclinica-supabase'
          directory: 'frontend/dist/frontend/browser'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  # ────────────────────────────────────────────────────────────
  # JOB 2: Wiki-only deploy (manual trigger)
  # ────────────────────────────────────────────────────────────
  build-wiki:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'wiki' || github.event.inputs.target == 'all')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Build Wiki (VitePress)
        run: |
          cd wiki-site
          npm ci
          npm run docs:build

      - name: ☁️ Deploy Wiki no Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'intraclinica-supabase'
          directory: 'wiki-site/.vitepress/dist'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
