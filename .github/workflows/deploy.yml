name: 🚀 CI/CD IntraClinica & Documentação

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4

      # -- PARTE 1: COMPILAR O SAAS (ANGULAR 18+) --
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Build Frontend (Angular)
        run: |
          cd frontend-v2
          npm ci
          ./node_modules/.bin/tsc --noEmit -p tsconfig.app.json
          npm run build -- --configuration=production

      # -- PARTE 2: MERGE DE ASSETS (APP + DOCS) --
      - name: 🔄 Integrar Documentação com o App Compilado
        run: |
          # Cria a pasta /doc/ dentro da pasta de publicação final do Angular (browser)
          mkdir -p frontend-v2/dist/frontend-v2/browser/doc
          
          # Copia o portal estático (index.html) e os arquivos Markdown para /doc/
          cp -r documentacao/* frontend-v2/dist/frontend-v2/browser/doc/

      # -- PARTE 3: PUBLICAÇÃO (CLOUDFLARE PAGES) --
      - name: ☁️ Deploy no Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'intraclinica'
          directory: 'frontend-v2/dist/frontend-v2/browser'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
