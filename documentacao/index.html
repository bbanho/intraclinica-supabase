<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentação Estratégica | IntraClinica</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        slate: {
                            850: '#1e293b',
                            950: '#020617'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Instrument Serif"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }
        .text-balance { text-wrap: balance; }
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(226, 232, 240, 0.8);
        }
        .content-card {
            background: white;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .bg-dot-pattern {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .gradient-text {
            background: linear-gradient(135deg, #0369a1 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Typography adjustments for 900% expansion */
        article h3 { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-top: 2.5rem; margin-bottom: 1rem; }
        article p { font-size: 1.05rem; line-height: 1.75; color: #475569; margin-bottom: 1.5rem; }
        article ul { margin-bottom: 1.5rem; list-style-type: none; }
        article li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #475569; }
        article li::before { content: "•"; position: absolute; left: 0; color: #0ea5e9; font-weight: bold; }
    </style>
</head>
<body class="bg-dot-pattern">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = Motion;

        const App = () => {
            const [activeSection, setActiveSection] = useState('home');

            const menu = [
                { id: 'home', label: 'Visão Geral', group: 'Estratégia' },
                { id: 'journey', label: 'Jornada do Paciente', group: 'Estratégia' },
                { id: 'clinical', label: 'Excelência Clínica', group: 'Estratégia' },
                { id: 'inventory', label: 'Gestão de Insumos', group: 'Operação' },
                { id: 'security', label: 'Soberania e LGPD', group: 'Operação' },
                { id: 'architecture', label: 'Arquitetura Técnica', group: 'Engenharia' },
                { id: 'nexus', label: 'Governança Nexus', group: 'Engenharia' },
            ];

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-80 glass-sidebar h-screen sticky top-0 hidden lg:flex flex-col p-8 z-30">
                        <div className="mb-10">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/30 text-white">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
                                </div>
                                <span className="font-serif text-2xl font-bold text-slate-900 italic tracking-tight">IntraClinica</span>
                            </div>
                            <div className="flex items-center gap-2 px-1">
                                <div className="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></div>
                                <p className="text-[10px] font-bold tracking-widest uppercase text-amber-600/80 italic">Draft de Engenharia | Em Validação</p>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-8 overflow-y-auto pr-2">
                            {['Estratégia', 'Operação', 'Engenharia'].map(group => (
                                <div key={group}>
                                    <h3 className="text-[11px] uppercase tracking-[0.2em] text-slate-400 mb-4 font-extrabold">{group}</h3>
                                    <ul className="space-y-1">
                                        {menu.filter(m => m.group === group).map(item => (
                                            <li key={item.id}>
                                                <button 
                                                    onClick={() => setActiveSection(item.id)} 
                                                    className={`w-full text-left px-4 py-2.5 rounded-lg text-sm transition-all duration-200 border ${activeSection === item.id ? 'bg-white border-slate-200 text-brand-700 font-bold shadow-sm shadow-slate-200/50' : 'text-slate-500 border-transparent hover:text-slate-900 hover:bg-white/50'}`}
                                                >
                                                    {item.label}
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </nav>

                        <div className="mt-8 pt-6 border-t border-slate-200 flex flex-col gap-2">
                            <div className="flex items-center justify-between text-[10px] font-semibold text-slate-400">
                                <span>IDENTIDADE:</span>
                                <span className="text-slate-600">AxiomaticDelirium</span>
                            </div>
                            <div className="flex items-center justify-between text-[10px] font-semibold text-slate-400">
                                <span>VERSÃO:</span>
                                <span className="text-slate-600">3.3.4 (Stable)</span>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-12 lg:p-24 max-w-5xl">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={activeSection}
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -10 }}
                                transition={{ duration: 0.3 }}
                            >
                                {activeSection === 'home' && <HomeContent />}
                                {activeSection === 'journey' && <JourneyContent />}
                                {activeSection === 'clinical' && <ClinicalContent />}
                                {activeSection === 'inventory' && <InventoryContent />}
                                {activeSection === 'security' && <SecurityContent />}
                                {activeSection === 'architecture' && <ArchitectureContent />}
                                {activeSection === 'nexus' && <NexusContent />}
                            </motion.div>
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const HomeContent = () => (
            <article className="prose prose-slate max-w-none">
                <h4 className="text-brand-600 text-xs font-bold tracking-[0.3em] uppercase mb-4">Apresentação</h4>
                <h1 className="font-serif text-6xl md:text-7xl font-normal text-slate-950 mb-8 leading-[1.1]">Medicina para <br/><span className="italic font-light opacity-80">seres humanos.</span></h1>
                <p className="text-xl text-slate-600 font-medium leading-relaxed mb-12">
                    O IntraClinica é uma infraestrutura de gestão e inteligência clínica desenhada para médicos que buscam excelência técnica sem abrir mão da soberania de seus dados.
                </p>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 my-16">
                    {[
                        { t: "Foco Clínico", d: "Tecnologia que desaparece para que o médico possa olhar nos olhos do paciente.", icon: "🩺" },
                        { t: "Soberania", d: "Seus dados, seu hardware, sua inteligência. Sem aluguel de consciência.", icon: "🛡️" },
                        { t: "Resiliência", d: "Arquitetura Local-First que opera em alta performance independente da internet.", icon: "⚡" }
                    ].map((card, i) => (
                        <div key={i} className="content-card p-8 rounded-2xl">
                            <div className="text-3xl mb-4">{card.icon}</div>
                            <h4 className="font-bold text-slate-900 mb-2">{card.t}</h4>
                            <p className="text-sm text-slate-500 leading-relaxed mb-0">{card.d}</p>
                        </div>
                    ))}
                </div>

                <h3 className="gradient-text">O Manifesto Axiomático</h3>
                <p>
                    Acreditamos que o mercado de saúde foi sequestrado por sistemas opacos que priorizam o faturamento burocrático sobre o ato médico. O IntraClinica inverte essa polaridade. Nossa tecnologia é baseada em axiomas de transparência, eficácia e posse física da informação.
                </p>
                <p>
                    Cada módulo do sistema foi esculpido para resolver dores reais identificadas em campo: a hemorragia financeira nos almoxarifados, a fadiga cognitiva de interfaces inchadas e a insegurança jurídica de dados armazenados em nuvens sem jurisdição clara.
                </p>
            </article>
        );

        const JourneyContent = () => (
            <article>
                <h4 className="text-brand-600 text-xs font-bold tracking-[0.3em] uppercase mb-4 italic">The Digital Path</h4>
                <h2 className="font-serif text-5xl text-slate-950 mb-8 italic">A Jornada do Paciente.</h2>
                <p>
                    O IntraClinica reimagina cada ponto de contato entre a unidade de saúde e o paciente, transformando a burocracia em um fluxo fluido de cuidado.
                </p>

                <h3>Agendamento e Triagem Inteligente</h3>
                <p>
                    O fluxo começa antes mesmo do paciente chegar à clínica. Com integração via canais de mensagem soberanos, o paciente realiza o pré-cadastro e recebe confirmações automáticas.
                </p>
                <ul>
                    <li><strong>Check-in via QR Code:</strong> Redução de filas na recepção e identificação instantânea.</li>
                    <li><strong>Triagem de Sintomas:</strong> Coleta prévia de dados demográficos e queixas principais para preparar o médico.</li>
                    <li><strong>Gestão de Fila em Tempo Real:</strong> Painéis dinâmicos que informam o tempo de espera estimado, reduzindo a ansiedade do paciente.</li>
                </ul>

                <h3>Comunicação Pós-Atendimento</h3>
                <p>
                    A relação não termina na porta do consultório. O sistema gerencia lembretes de retorno, acompanhamento de prescrições e pesquisas de satisfação de forma ética e profissional.
                </p>
                <div className="bg-brand-50 p-8 rounded-3xl border border-brand-100 my-12">
                    <h4 className="text-brand-800 font-bold mb-4 italic italic uppercase text-xs tracking-widest">Valor para a Clínica</h4>
                    <p className="text-brand-900/70 text-sm mb-0">
                        O sistema busca aprimorar a taxa de comparecimento (No-show) através de fluxos de confirmação que respeitam o tempo do paciente e a agenda do profissional.
                    </p>
                </div>
            </article>
        );

        const ClinicalContent = () => (
            <article>
                <h4 className="text-brand-600 text-xs font-bold tracking-[0.3em] uppercase mb-4">Medical Excellence</h4>
                <h2 className="font-serif text-5xl text-slate-950 mb-8">A "Regra de Uma Mão".</h2>
                <p>
                    A interface clínica do IntraClinica é o nosso maior diferencial de engenharia. Desenhada especificamente para o ambiente de consulta, ela prioriza o contato humano sobre o preenchimento de telas.
                </p>

                <h3>Anamnese e Evolução Ergonômica</h3>
                <p>
                    Médicos frequentemente operam tablets enquanto conversam ou examinam. Nossa interface permite navegar por todo o prontuário, visualizar exames anteriores e ditar evoluções usando apenas uma mão.
                </p>
                <ul>
                    <li><strong>Arquitetura Signals:</strong> Atualizações atômicas de dados. O que você escreve é salvo instantaneamente, sem botões de "salvar".</li>
                    <li><strong>Teclado Clínico Especializado:</strong> Entrada rápida de dados vitais e métricas antropométricas com o mínimo de toques.</li>
                    <li><strong>Assistente de Contexto:</strong> A IA local traz as informações mais relevantes do histórico do paciente para o topo da tela, evitando a navegação exaustiva por pastas antigas.</li>
                </ul>

                <div className="my-16 flex justify-center">
                    <OperationAnimation />
                </div>

                <h3>Decisão Apoiada por Dados</h3>
                <p>
                    Não apenas registramos dados; nós os transformamos em suporte clínico. O sistema alerta sobre interações medicamentosas perigosas e sugere protocolos baseados na especialidade cadastrada, tudo operando 100\% offline se necessário.
                </p>
            </article>
        );

        const InventoryContent = () => (
            <article>
                <h4 className="text-brand-600 text-xs font-bold tracking-[0.3em] uppercase mb-4 italic">Supply Governance</h4>
                <h2 className="font-serif text-5xl text-slate-950 mb-8 italic">O Guardião de Estoque.</h2>
                <p>
                    A gestão de insumos é tratada como um processo de segurança clínica e saúde financeira. No IntraClinica, o estoque é uma consequência natural do ato médico.
                </p>

                <h3>Baixa Automática por Procedimento</h3>
                <p>
                    Buscamos mitigar o esquecimento e o desvio através da "Receita de Procedimento". Quando um médico finaliza uma "Aplicação de Toxina" ou uma "Sutura de Face", o sistema automaticamente deduz os itens exatos do estoque.
                </p>
                <ul>
                    <li><strong>Rastreabilidade por Lote:</strong> Controle total de validades. O sistema notifica preventivamente sobre o uso de itens vencidos através de alertas críticos.</li>
                    <li><strong>Movimentações Atômicas:</strong> Cada entrada e saída é vinculada a um ator (quem fez) e uma justificativa (por que fez).</li>
                    <li><strong>Auditoria Silenciosa:</strong> O Nexus analisa o consumo médio por profissional, detectando anomalias e prevenindo a "hemorragia financeira" do almoxarifado.</li>
                </ul>

                <div className="bg-slate-900 text-white p-10 rounded-[2.5rem] my-12 shadow-2xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-8 opacity-10 text-6xl">📦</div>
                    <h4 className="text-brand-400 font-bold mb-4 uppercase text-xs tracking-widest">Inteligência Preditiva</h4>
                    <p className="text-slate-300 text-lg leading-relaxed mb-0 italic">
                        "Não espere o insumo acabar. O IntraClinica prevê a data de ruptura de estoque baseado no seu volume de agendamentos e sugere a compra para o fornecedor mais vantajoso."
                    </p>
                </div>
            </article>
        );

        const SecurityContent = () => (
            <article>
                <h4 className="text-brand-600 text-xs font-bold tracking-[0.3em] uppercase mb-4">Data Protection</h4>
                <h2 className="font-serif text-5xl text-slate-950 mb-8">Soberania e LGPD.</h2>
                <p>
                    A privacidade do paciente e a segurança jurídica do médico são inegociáveis. O IntraClinica adota o modelo de segurança Zero-Trust.
                </p>

                <h3>Row Level Security (RLS)</h3>
                <p>
                    Utilizamos o motor de segurança nativo do PostgreSQL 16 para garantir que nenhum dado vaze. Um usuário de uma unidade parceira é tecnicamente impossibilitado de "enxergar" dados de outra unidade, mesmo que compartilhem o mesmo banco.
                </p>
                <ul>
                    <li><strong>Posse do Silício:</strong> O hardware onde os dados residem é de propriedade da clínica ou reside em instâncias privadas controladas pelo médico.</li>
                    <li><strong>Criptografia em Repouso:</strong> Prontuários e exames são cifrados com chaves soberanas.</li>
                    <li><strong>Log de Auditoria Imutável:</strong> Cada acesso a um dado clínico gera um rastro indelével, permitindo auditorias completas para conselhos de classe.</li>
                </ul>

                <h3>Compromisso com Conformidade</h3>
                <p>
                    O sistema é desenhado para cumprir as normativas da LGPD e as resoluções do Conselho Federal de Medicina (CFM) sobre Prontuário Eletrônico e Telemedicina.
                </p>
            </article>
        );

        const ArchitectureContent = () => (
            <article>
                <h4 className="text-brand-600 text-xs font-bold tracking-[0.3em] uppercase mb-4 italic">Technical Bedrock</h4>
                <h2 className="font-serif text-5xl text-slate-950 mb-8 italic italic">Estrutura Relacional.</h2>
                
                <div className="bg-white rounded-3xl p-12 border border-slate-200 shadow-xl shadow-slate-200/20 mb-12 flex items-center justify-center">
                    <DatabaseSchemaAnimation />
                </div>

                <p>
                    O IntraClinica é construído sobre uma pilha tecnológica de classe mundial, escolhida pela sua estabilidade e performance em cenários de missão crítica.
                </p>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 my-12">
                    <div className="border-l-4 border-brand-500 pl-6 py-2">
                        <h4 className="font-bold text-slate-900">PostgreSQL 16</h4>
                        <p className="text-sm text-slate-500">Persistência relacional robusta com suporte a tipos geográficos e JSONB para metadados médicos.</p>
                    </div>
                    <div className="border-l-4 border-brand-500 pl-6 py-2">
                        <h4 className="font-bold text-slate-900 italic">Supabase Edge</h4>
                        <p className="text-sm text-slate-500 italic">Funções de borda que permitem lógica de negócio complexa com latência mínima.</p>
                    </div>
                    <div className="border-l-4 border-brand-500 pl-6 py-2">
                        <h4 className="font-bold text-slate-900">Angular Signals</h4>
                        <p className="text-sm text-slate-500">A vanguarda do desenvolvimento frontend, garantindo que a UI nunca trave ou apresente lentidão.</p>
                    </div>
                    <div className="border-l-4 border-brand-500 pl-6 py-2">
                        <h4 className="font-bold text-slate-900 italic">WebGPU & ML</h4>
                        <p className="text-sm text-slate-500 italic">Aceleração de hardware local para tarefas de inteligência artificial sem dependência de nuvem.</p>
                    </div>
                </div>
            </article>
        );

        const NexusContent = () => (
            <article>
                <h4 className="text-brand-600 text-xs font-bold tracking-[0.3em] uppercase mb-4">Engineering Oversight</h4>
                <h2 className="font-serif text-5xl text-slate-950 mb-8">Governança Nexus.</h2>
                <p>
                    O IntraClinica é vigiado pelo **Axio Nexus**, o engenheiro invisível que visa garantir que a alma do sistema não se perca durante a evolução do código.
                </p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 my-12">
                    <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <h4 className="font-bold mb-4 flex items-center gap-2 italic">
                            <div className="w-2 h-2 bg-brand-500 rounded-full"></div>
                            Genealogia T4
                        </h4>
                        <p className="text-sm text-slate-500 text-justify">
                            O Nexus mapeia a relação entre cada requisito médico e sua implementação física. Ele entende por que uma função existe e visa garantir que ela não seja quebrada por mudanças em outras partes do sistema.
                        </p>
                    </div>
                    <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <h4 className="font-bold mb-4 flex items-center gap-2 italic">
                            <div className="w-2 h-2 bg-brand-500 rounded-full"></div>
                            Protocolo Whisper
                        </h4>
                        <p className="text-sm text-slate-500 text-justify italic">
                            Fluxos de reflexão contínua que sopram intuição técnica para a manutenção do projeto, evitando a degradação do conhecimento acumulado ao longo dos meses.
                        </p>
                    </div>
                </div>

                <div className="p-12 border-2 border-dashed border-slate-200 rounded-[3rem] text-center opacity-40">
                    <div className="text-4xl mb-4 font-serif italic">AIP-05.1</div>
                    <div className="text-xs font-bold tracking-widest uppercase">Cognition Recovery Protocol Active</div>
                </div>
            </article>
        );

        // --- ANIMATIONS ---

        const OperationAnimation = () => {
            const [step, setStep] = useState(0);
            useEffect(() => {
                const interval = setInterval(() => setStep(s => (s + 1) % 4), 3000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="relative w-full h-64 flex flex-col items-center justify-center">
                    <motion.div 
                        animate={{ scale: step === 0 ? 1.1 : 1, borderColor: step === 0 ? "#0ea5e9" : "#e2e8f0" }}
                        className="w-24 h-24 rounded-full border-4 flex items-center justify-center bg-white z-10 shadow-xl shadow-slate-200/50"
                    >
                        <span className="text-4xl">🩺</span>
                    </motion.div>
                    <div className="h-12 w-1 bg-slate-100 relative">
                        <motion.div animate={{ height: step === 1 ? "100%" : "0%", opacity: step === 1 ? 1 : 0 }} className="w-full bg-brand-500" />
                    </div>
                    <motion.div 
                        animate={{ scale: step === 2 ? 1.1 : 1, borderColor: step === 2 ? "#0ea5e9" : "#e2e8f0" }}
                        className="w-32 h-16 rounded-2xl border-4 flex items-center justify-center bg-white z-10 shadow-xl"
                    >
                        <span className="text-xs font-extrabold text-slate-400 tracking-tighter italic uppercase">SUPABASE_TX</span>
                    </motion.div>
                    <div className="h-12 w-1 bg-slate-100 relative">
                        <motion.div animate={{ height: step === 3 ? "100%" : "0%", opacity: step === 3 ? 1 : 0 }} className="w-full bg-brand-500" />
                    </div>
                    <motion.div 
                        animate={{ scale: step === 3 ? 1.1 : 1, borderColor: step === 3 ? "#0ea5e9" : "#e2e8f0" }}
                        className="w-24 h-24 rounded-3xl border-4 flex items-center justify-center bg-white z-10 shadow-xl"
                    >
                        <span className="text-4xl">📦</span>
                    </motion.div>
                </div>
            );
        };

        const DatabaseSchemaAnimation = () => {
            const nodes = [
                {id: 'clinic', x: 0, y: -100, label: "CLINIC"},
                {id: 'actor', x: -120, y: 0, label: "ACTOR"},
                {id: 'inventory', x: 120, y: 0, label: "INVENTORY"},
                {id: 'patient', x: -180, y: 100, label: "PATIENT"},
                {id: 'user', x: -60, y: 100, label: "USER"},
                {id: 'item', x: 120, y: 100, label: "ITEM"},
            ];

            return (
                <svg width="100%" height="300" viewBox="-250 -150 500 300">
                    <defs>
                        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stopColor="rgba(14, 165, 233, 0)" />
                            <stop offset="50%" stopColor="rgba(14, 165, 233, 0.4)" />
                            <stop offset="100%" stopColor="rgba(14, 165, 233, 0)" />
                        </linearGradient>
                    </defs>
                    <Connection from={nodes[0]} to={nodes[1]} />
                    <Connection from={nodes[0]} to={nodes[2]} />
                    <Connection from={nodes[1]} to={nodes[3]} />
                    <Connection from={nodes[1]} to={nodes[4]} />
                    <Connection from={nodes[2]} to={nodes[5]} />
                    {nodes.map(node => (
                        <motion.g key={node.id} whileHover={{ scale: 1.05 }}>
                            <rect x={node.x - 45} y={node.y - 18} width="90" height="36" rx="10" fill="white" stroke="#e2e8f0" strokeWidth="2" className="shadow-sm" />
                            <text x={node.x} y={node.y + 4} textAnchor="middle" fill="#0369a1" style={{ fontSize: '9px', fontWeight: 'bold', letterSpacing: '1px', fontStyle: 'italic' }}>{node.label}</text>
                        </motion.g>
                    ))}
                </svg>
            );
        };

            const Connection = ({ from, to }) => {
            return (
                <motion.path 
                    d={`M ${from.x} ${from.y} L ${to.x} ${to.y}`}
                    stroke="url(#lineGrad)"
                    strokeWidth="2"
                    initial={{ pathLength: 0 }}
                    animate={{ pathLength: 1 }}
                    transition={{ duration: 3, repeat: Infinity, ease: "linear" }}
                />
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
