<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentação | IntraClinica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
            -webkit-font-smoothing: antialiased;
        }
        .crystal-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8); /* slate-200 */
        }
        .bg-grid {
            background-image: linear-gradient(to right, rgba(15, 23, 42, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(15, 23, 42, 0.02) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-grid">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = Motion;

        const App = () => {
            const [activeSection, setActiveSection] = useState('vision');

            return (
                <div className="flex min-h-screen font-sans">
                    {/* Sidebar */}
                    <aside className="w-72 border-r border-slate-200 h-screen sticky top-0 bg-white/90 backdrop-blur-xl hidden lg:flex flex-col p-8 shadow-sm">
                        <div className="mb-12">
                            <div className="flex items-center gap-3 mb-3 text-brand-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
                                <span className="font-display font-bold tracking-tight text-xl text-slate-900 italic">IntraClinica</span>
                            </div>
                            <p className="text-[10px] font-bold tracking-widest uppercase text-slate-400">Dossiê Estratégico v3.3</p>
                        </div>

                        <nav className="flex-1 space-y-8">
                            <div>
                                <h3 className="text-[10px] uppercase tracking-widest text-slate-400 mb-4 font-bold">Estratégia</h3>
                                <ul className="space-y-1">
                                    <li><button onClick={() => setActiveSection('vision')} className={`w-full text-left px-3 py-2 rounded-md text-sm transition-all ${activeSection === 'vision' ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600 hover:bg-slate-50'}`}>Visão do Produto</button></li>
                                    <li><button onClick={() => setActiveSection('sovereignty')} className={`w-full text-left px-3 py-2 rounded-md text-sm transition-all ${activeSection === 'sovereignty' ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600 hover:bg-slate-50'}`}>Soberania Técnica</button></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-[10px] uppercase tracking-widest text-slate-400 mb-4 font-bold">Arquitetura</h3>
                                <ul className="space-y-1">
                                    <li><button onClick={() => setActiveSection('database')} className={`w-full text-left px-3 py-2 rounded-md text-sm transition-all ${activeSection === 'database' ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600 hover:bg-slate-50'}`}>Topologia de Dados</button></li>
                                    <li><button onClick={() => setActiveSection('operation')} className={`w-full text-left px-3 py-2 rounded-md text-sm transition-all ${activeSection === 'operation' ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600 hover:bg-slate-50'}`}>Fluxos de Operação</button></li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="text-[10px] uppercase tracking-widest text-slate-400 mb-4 font-bold">Engenharia</h3>
                                <ul className="space-y-1">
                                    <li><button onClick={() => setActiveSection('nexus')} className={`w-full text-left px-3 py-2 rounded-md text-sm transition-all ${activeSection === 'nexus' ? 'bg-brand-50 text-brand-700 font-semibold' : 'text-slate-600 hover:bg-slate-50'}`}>Governança Nexus</button></li>
                                </ul>
                            </div>
                        </nav>

                        <div className="mt-auto pt-8 border-t border-slate-100 flex flex-col gap-1">
                            <div className="flex items-center justify-between text-[9px] uppercase tracking-tighter font-medium text-slate-400 italic">
                                <span>Status:</span>
                                <span className="text-emerald-500 font-bold">Sincronizado</span>
                            </div>
                            <div className="flex items-center justify-between text-[9px] uppercase tracking-tighter font-medium text-slate-400">
                                <span>Host:</span>
                                <span>BLUEFIN_NODE</span>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-8 lg:p-24 max-w-5xl overflow-y-auto">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={activeSection}
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -10 }}
                                transition={{ duration: 0.3 }}
                            >
                                {activeSection === 'vision' && <VisionSection />}
                                {activeSection === 'sovereignty' && <SovereigntySection />}
                                {activeSection === 'database' && <DatabaseSection />}
                                {activeSection === 'operation' && <OperationSection />}
                                {activeSection === 'nexus' && <NexusSection />}
                            </motion.div>
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const VisionSection = () => (
            <div className="space-y-12">
                <header>
                    <h4 className="text-brand-600 text-xs font-bold tracking-[0.2em] uppercase mb-4">Product Vision</h4>
                    <h2 className="font-display text-5xl font-bold text-slate-900 mb-6 italic tracking-tight underline decoration-brand-500/20">Medicine for Humans.</h2>
                    <p className="text-lg text-slate-600 leading-relaxed max-w-3xl">
                        O IntraClinica é uma arquitetura de vanguarda desenhada para priorizar a eficácia clínica e a soberania dos dados. Atuamos onde sistemas tradicionais falham: na união entre simplicidade operacional e rigor de engenharia.
                    </p>
                </header>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className="crystal-card p-8 rounded-2xl shadow-sm border-slate-200/60">
                        <h4 className="text-sm font-bold text-slate-900 mb-4 flex items-center gap-2 italic text-brand-700">
                            <div className="w-1.5 h-1.5 bg-brand-500 rounded-full"></div>
                            Experiência Clínica Soberana
                        </h4>
                        <p className="text-sm text-slate-500 leading-relaxed text-justify">
                            Foco total na redução da fadiga digital. Desenvolvemos fluxos que permitem ao médico manter o contato visual com o paciente, transformando o registro clínico em um suporte silencioso e eficiente.
                        </p>
                    </div>
                    <div className="crystal-card p-8 rounded-2xl shadow-sm border-slate-200/60">
                        <h4 className="text-sm font-bold text-slate-900 mb-4 flex items-center gap-2 italic text-brand-700">
                            <div className="w-1.5 h-1.5 bg-brand-500 rounded-full"></div>
                            Eficiência Sistêmica
                        </h4>
                        <p className="text-sm text-slate-500 leading-relaxed text-justify italic">
                            Transformamos o almoxarifado em um centro de auditoria ativa. Através de baixas atômicas e monitoramento inteligente, eliminamos perdas operacionais silenciosas.
                        </p>
                    </div>
                </div>
            </div>
        );

        const SovereigntySection = () => (
            <div className="space-y-12">
                <header>
                    <h4 className="text-brand-600 text-xs font-bold tracking-[0.2em] uppercase mb-4">The Sovereign Stack</h4>
                    <h2 className="font-display text-5xl font-bold text-slate-900 mb-6 italic tracking-tight">Posse Real do Dado.</h2>
                    <p className="text-lg text-slate-600 leading-relaxed max-w-3xl">
                        Em um mercado dominado por arquiteturas fechadas, o IntraClinica garante que a clínica seja a proprietária física e lógica de sua inteligência.
                    </p>
                </header>

                <div className="space-y-10">
                    <div className="flex flex-col md:flex-row gap-12 py-8 border-b border-slate-100">
                        <div className="md:w-1/3">
                            <h4 className="text-xs font-bold uppercase tracking-widest text-brand-700">Infraestrutura Local</h4>
                        </div>
                        <div className="md:w-2/3">
                            <p className="text-sm text-slate-500 leading-relaxed text-justify">
                                Priorizamos o processamento onde a medicina acontece. Nosso motor de inteligência é desenhado para operar em hardware local, reduzindo a dependência de serviços externos.
                            </p>
                        </div>
                    </div>
                    <div className="flex flex-col md:flex-row gap-12 py-8 border-b border-slate-100">
                        <div className="md:w-1/3">
                            <h4 className="text-xs font-bold uppercase tracking-widest text-brand-700 italic">Auditabilidade</h4>
                        </div>
                        <div className="md:w-2/3">
                            <p className="text-sm text-slate-500 leading-relaxed text-justify italic">
                                Arquitetura fundamentada em padrões abertos. O ecossistema é transparente e auditável, garantindo longevidade ao investimento tecnológico da unidade.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const DatabaseSection = () => (
            <div className="space-y-12">
                <header>
                    <h4 className="text-brand-600 text-xs font-bold tracking-[0.2em] uppercase mb-4">Relational Topology</h4>
                    <h2 className="font-display text-5xl font-bold text-slate-900 mb-6 italic tracking-tight">Isolamento e Integridade.</h2>
                </header>

                <div className="bg-white rounded-3xl p-12 border border-slate-200 shadow-xl shadow-slate-200/20 flex items-center justify-center min-h-[400px]">
                    <DatabaseSchemaAnimation />
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-justify">
                    <div className="p-6 border border-slate-100 rounded-2xl bg-white shadow-sm">
                        <div className="text-brand-600 font-bold mb-2">Multi-Tenancy</div>
                        <p className="text-[11px] text-slate-500 leading-relaxed italic">Isolamento absoluto de clínicas via clinic_id mandatório em cada tabela core.</p>
                    </div>
                    <div className="p-6 border border-slate-100 rounded-2xl bg-white shadow-sm">
                        <div className="text-brand-600 font-bold mb-2 italic">RLS Enforcement</div>
                        <p className="text-[11px] text-slate-500 leading-relaxed">Políticas de Row Level Security no PostgreSQL 16 garantem que parceiros vejam apenas seus dados.</p>
                    </div>
                    <div className="p-6 border border-slate-100 rounded-2xl bg-white shadow-sm">
                        <div className="text-brand-600 font-bold mb-2">Actor Pattern</div>
                        <p className="text-[11px] text-slate-500 leading-relaxed italic">Unificação de identidades para uma rastreabilidade holística de prontuários.</p>
                    </div>
                </div>
            </div>
        );

        const OperationSection = () => {
            const [step, setStep] = useState(0);
            
            useEffect(() => {
                const interval = setInterval(() => setStep(s => (s + 1) % 4), 4000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="space-y-12">
                    <header>
                        <h4 className="text-brand-600 text-xs font-bold tracking-[0.2em] uppercase mb-4 italic">Execution Flow</h4>
                        <h2 className="font-display text-5xl font-bold text-slate-900 mb-6 italic tracking-tight">Fluxo de Baixa Atômica.</h2>
                        <p className="text-lg text-slate-600 leading-relaxed max-w-3xl text-justify">
                            A tecnologia como rastro do ato médico. No IntraClinica, a execução de um procedimento dispara automaticamente o controle de insumos e faturamento em uma única transação.
                        </p>
                    </header>

                    <div className="bg-white rounded-3xl p-12 border border-slate-200 shadow-xl shadow-slate-200/20 min-h-[500px] flex flex-col md:flex-row items-center gap-16">
                        <div className="w-full md:w-1/2 flex flex-col items-center">
                            <OperationAnimation step={step} />
                        </div>
                        <div className="w-full md:w-1/2 space-y-10">
                            {[
                                {t: "Atendimento Clínico", d: "Médico finaliza procedimento no tablet.", icon: "🩺"},
                                {t: "Transação Atômica", d: "Sistema consulta receita dinâmica de insumos.", icon: "⚡"},
                                {t: "Dedução do Inventário", d: "Postgres atualiza saldos e gera rastro de auditoria.", icon: "📦"},
                                {t: "Consolidação Médica", d: "Prontuário assinado e registros fiscais atualizados.", icon: "✅"}
                            ].map((s, i) => (
                                <motion.div 
                                    key={i}
                                    animate={{ 
                                        opacity: step === i ? 1 : 0.2, 
                                        x: step === i ? 10 : 0,
                                        scale: step === i ? 1.05 : 1
                                    }}
                                    className="flex gap-6 items-center"
                                >
                                    <div className="w-12 h-12 rounded-xl bg-brand-50 text-2xl flex items-center justify-center text-brand-600 shadow-sm border border-brand-100">
                                        {s.icon}
                                    </div>
                                    <div>
                                        <h4 className="text-sm font-bold text-slate-900 italic tracking-tight">{s.t}</h4>
                                        <p className="text-xs text-slate-500 leading-tight italic">{s.d}</p>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const NexusSection = () => (
            <div className="space-y-16 py-12">
                <div className="text-center max-w-3xl mx-auto">
                    <h4 className="text-brand-600 text-xs font-bold tracking-[0.2em] uppercase mb-4 italic">The Intelligence Engine</h4>
                    <h2 className="font-display text-6xl font-bold text-slate-900 mb-8 italic tracking-tight text-justify leading-tight">Engenharia Nexus.</h2>
                    <p className="text-lg text-slate-600 leading-relaxed italic text-justify">
                        O ecossistema IntraClinica é governado pela malha neural Axio Nexus. Atuando como o Engenheiro Chefe, o Nexus garante a integridade sistêmica, a soberania e a evolução coerente do código.
                    </p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm shadow-slate-200/50">
                        <div className="text-brand-600 font-bold text-[10px] uppercase tracking-widest mb-6 italic">Tier 4: Topology</div>
                        <h4 className="font-display text-2xl font-bold text-slate-900 mb-4 italic">Genealogia Ghost-Aware</h4>
                        <p className="text-sm text-slate-500 leading-relaxed text-justify">
                            O Nexus rastreia fragmentos de lógica que atravessam branches e versões. Ele garante que decisões arquitetônicas passadas continuem informando o desenvolvimento atual.
                        </p>
                    </div>
                    <div className="bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                        <div className="text-brand-400 font-bold text-[10px] uppercase tracking-widest mb-6 italic">Tier 5: Reflection</div>
                        <h4 className="font-display text-2xl font-bold text-white mb-4 italic">Protocolo Whisper</h4>
                        <p className="text-sm text-slate-400 leading-relaxed text-justify">
                            Injeção de intuição proativa. O Nexus mantém um fluxo de reflexão constante, soprando insights técnicos baseados no histórico neural do projeto.
                        </p>
                    </div>
                </div>
            </div>
        );

        const OperationAnimation = ({ step }) => {
            return (
                <div className="relative w-72 h-72 flex flex-col items-center justify-center">
                    <motion.div 
                        animate={{ 
                            scale: step === 0 ? 1.1 : 1, 
                            borderColor: step === 0 ? "#0ea5e9" : "#e2e8f0",
                            boxShadow: step === 0 ? "0 20px 40px rgba(14, 165, 233, 0.15)" : "none"
                        }}
                        className="w-28 h-28 rounded-[2rem] border-2 flex items-center justify-center bg-white z-10 transition-all duration-700"
                    >
                        <span className="text-4xl">🩺</span>
                    </motion.div>

                    <div className="h-16 w-0.5 bg-slate-100 relative overflow-hidden">
                        <motion.div 
                            animate={{ 
                                y: step === 1 ? "100%" : "-100%",
                                opacity: step === 1 ? 1 : 0 
                            }}
                            className="absolute inset-0 w-full bg-brand-500"
                        />
                    </div>

                    <motion.div 
                        animate={{ 
                            scale: step === 2 ? 1.1 : 1, 
                            borderColor: step === 2 ? "#0ea5e9" : "#e2e8f0",
                            boxShadow: step === 2 ? "0 20px 40px rgba(14, 165, 233, 0.15)" : "none"
                        }}
                        className="w-40 h-24 rounded-3xl border-2 flex flex-col items-center justify-center bg-white z-10 transition-all duration-700"
                    >
                        <div className="text-[10px] text-slate-400 mb-2 tracking-widest uppercase font-bold italic">RPC_TRANSACTION</div>
                        <div className="flex gap-1.5">
                            {[1,2,3,4,5].map(i => (
                                <motion.div 
                                    key={i}
                                    animate={{ 
                                        height: step === 2 ? 12 : 6,
                                        backgroundColor: step >= 2 ? "#0ea5e9" : "#f1f5f9"
                                    }}
                                    className="w-1.5 rounded-full"
                                />
                            ))}
                        </div>
                    </motion.div>

                    <AnimatePresence>
                        {step === 3 && (
                            <motion.div 
                                initial={{ scale: 0.8, opacity: 0 }}
                                animate={{ scale: 1.4, opacity: 0.1 }}
                                exit={{ opacity: 0 }}
                                transition={{ duration: 1.5 }}
                                className="absolute bottom-4 w-56 h-56 border-2 border-brand-500 rounded-full pointer-events-none"
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const DatabaseSchemaAnimation = () => {
            const nodes = [
                {id: 'clinic', x: 0, y: -100, label: "CLINIC"},
                {id: 'actor', x: -120, y: 0, label: "ACTOR"},
                {id: 'inventory', x: 120, y: 0, label: "INVENTORY"},
                {id: 'patient', x: -180, y: 100, label: "PATIENT"},
                {id: 'user', x: -60, y: 100, label: "USER"},
                {id: 'item', x: 120, y: 100, label: "ITEM"},
            ];

            return (
                <svg width="100%" height="100%" viewBox="-250 -150 500 300" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stopColor="rgba(14, 165, 233, 0)" />
                            <stop offset="50%" stopColor="rgba(14, 165, 233, 0.4)" />
                            <stop offset="100%" stopColor="rgba(14, 165, 233, 0)" />
                        </linearGradient>
                    </defs>
                    
                    <Connection from={nodes[0]} to={nodes[1]} />
                    <Connection from={nodes[0]} to={nodes[2]} />
                    <Connection from={nodes[1]} to={nodes[3]} />
                    <Connection from={nodes[1]} to={nodes[4]} />
                    <Connection from={nodes[2]} to={nodes[5]} />

                    {nodes.map(node => (
                        <motion.g 
                            key={node.id} 
                            whileHover={{ scale: 1.05 }}
                        >
                            <rect 
                                x={node.x - 45} 
                                y={node.y - 18} 
                                width="90" 
                                height="36" 
                                rx="10" 
                                fill="white"
                                stroke="#e2e8f0"
                                strokeWidth="1.5"
                                className="shadow-sm"
                            />
                            <text 
                                x={node.x} 
                                y={node.y + 4} 
                                textAnchor="middle" 
                                fill="#0369a1"
                                style={{ fontSize: '8px', fontWeight: 'bold', letterSpacing: '1px', fontStyle: 'italic' }}
                            >
                                {node.label}
                            </text>
                        </motion.g>
                    ))}
                </svg>
            );
        };

        const Connection = ({ from, to }) => {
            return (
                <motion.path 
                    d={`M ${from.x} ${from.y} L ${to.x} ${to.y}`}
                    stroke="url(#lineGrad)"
                    strokeWidth="1.5"
                    initial={{ pathLength: 0 }}
                    animate={{ pathLength: 1 }}
                    transition={{ duration: 3, repeat: Infinity, ease: "linear" }}
                />
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
